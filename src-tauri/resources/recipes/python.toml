[meta]
id = "python"
display_name = "Python"
category = "runtime"

# 常见 LTS 版本
[parameters.python_version]
label = "Python 版本"
default = "3.12.7"
options = [
  { value = "3.13.0", label = "3.13 (最新)" },
  { value = "3.12.7", label = "3.12 (推荐)" },
  { value = "3.11.10", label = "3.11" },
  { value = "3.10.15", label = "3.10" },
]

# 零提权安装：官方 embeddable zip → 解压到 %LOCALAPPDATA%\Programs\Python\ → get-pip.py → 加 PATH
[install.windows]
requires_elevation = false
add_to_user_path = [
  "%LOCALAPPDATA%\\Programs\\Python\\python-{python_version}",
  "%LOCALAPPDATA%\\Programs\\Python\\python-{python_version}\\Scripts",
]
steps = [
  # 1) 准备目标目录
  { cmd = "powershell", args = ["-NoProfile", "-Command", "New-Item -ItemType Directory -Force -Path \"$env:LOCALAPPDATA\\Programs\\Python\\python-{python_version}\" | Out-Null"] },
  # 2) 下载 embeddable zip
  { cmd = "powershell", args = ["-NoProfile", "-Command", "Invoke-WebRequest -Uri \"https://www.python.org/ftp/python/{python_version}/python-{python_version}-embed-amd64.zip\" -OutFile \"$env:TEMP\\python-{python_version}-embed.zip\""] },
  # 3) 解压
  { cmd = "powershell", args = ["-NoProfile", "-Command", "Expand-Archive -Path \"$env:TEMP\\python-{python_version}-embed.zip\" -DestinationPath \"$env:LOCALAPPDATA\\Programs\\Python\\python-{python_version}\" -Force"] },
  # 4) 启用 site（embeddable 默认关闭，会导致 pip 不可用）。
  #    ._pth 文件名随版本变化（python313._pth 等），故通配匹配而非硬编码版本号。
  { cmd = "powershell", args = ["-NoProfile", "-Command", "Get-ChildItem -Path \"$env:LOCALAPPDATA\\Programs\\Python\\python-{python_version}\" -Filter 'python*._pth' | ForEach-Object {{ (Get-Content $_.FullName) -replace '^#import site', 'import site' | Set-Content $_.FullName }}"] },
  # 5) 拉取并运行 get-pip.py
  { cmd = "powershell", args = ["-NoProfile", "-Command", "Invoke-WebRequest -Uri https://bootstrap.pypa.io/get-pip.py -OutFile \"$env:TEMP\\get-pip.py\"; & \"$env:LOCALAPPDATA\\Programs\\Python\\python-{python_version}\\python.exe\" \"$env:TEMP\\get-pip.py\""] },
]

[install.macos]
requires_elevation = false
steps = [
  { cmd = "bash", args = ["-c", "brew install python@3.12 || echo 'brew not available; install Python manually'"] },
]

[install.linux]
requires_elevation = false
steps = [
  { cmd = "bash", args = ["-c", "sudo apt-get install -y python3 python3-pip || echo 'apt-get failed; install Python manually'"] },
]

[detect.windows]
cmd = "python"
args = ["--version"]
