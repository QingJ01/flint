[meta]
id = "git"
display_name = "Git"
category = "runtime"

# MinGit 是 git-for-windows 提供的极简包（~50MB），
# 解压即用，免安装、零提权。砍掉了 Bash/GUI/Perl，对 vibecoder 够用。
# Git 资产名不规整（windows.1 省略小版本、windows.3 带 .3），故不硬编码 URL：
# 运行时查 latest release，从 assets 里取 MinGit-*-64-bit.zip 的真实下载链接。
# 「重新安装」即升级到最新稳定版（前端按钮文案为「升级到最新」）。
[install.windows]
requires_elevation = false
add_to_user_path = [
  "%LOCALAPPDATA%\\Programs\\Git\\cmd",
  "%LOCALAPPDATA%\\Programs\\Git\\mingw64\\bin",
  "%LOCALAPPDATA%\\Programs\\Git\\usr\\bin",
]
steps = [
  { cmd = "powershell", args = ["-NoProfile", "-Command", "New-Item -ItemType Directory -Force -Path \"$env:LOCALAPPDATA\\Programs\\Git\" | Out-Null"] },
  { cmd = "powershell", args = ["-NoProfile", "-Command", "$rel = irm 'https://api.github.com/repos/git-for-windows/git/releases/latest'; $asset = $rel.assets | Where-Object name -match '^MinGit-.*-64-bit\\.zip$' | Where-Object name -notmatch 'busybox' | Select-Object -First 1; Invoke-WebRequest -Uri $asset.browser_download_url -OutFile \"$env:TEMP\\mingit.zip\""] },
  { cmd = "powershell", args = ["-NoProfile", "-Command", "Expand-Archive -Path \"$env:TEMP\\mingit.zip\" -DestinationPath \"$env:LOCALAPPDATA\\Programs\\Git\" -Force"] },
]

[install.macos]
requires_elevation = false
steps = [
  { cmd = "bash", args = ["-c", "xcode-select --install 2>/dev/null || brew install git"] },
]

[install.linux]
requires_elevation = false
steps = [
  { cmd = "bash", args = ["-c", "sudo apt-get install -y git"] },
]

[detect.windows]
cmd = "git"
args = ["--version"]
